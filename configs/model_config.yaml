gcn:
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1
  residual: true
  batch_norm: true
  max_distance_km: 50.0  # prune edges beyond this distance

tft:
  hidden_size: 128
  num_attention_heads: 4
  lstm_layers: 2
  dropout: 0.1
  lookback_hours: 168        # 7-day lookback window
  horizons:
    short: 6                 # 0-6 hours
    mid: 168                 # 1-7 days (in hours)
    long: 4320               # 1-6 months (in hours, ~180 days)
  static_embedding_dim: 32
  variable_selection_hidden: 64

context_attention:
  deviation_threshold: 2.0   # std-devs from baseline to trigger override
  scaling_bounds: [0.5, 1.5]
  mlp_hidden: 32
  signals:
    - traffic_speed_kmh
    - rainfall_mm
    - aqi

uncertainty:
  mc_dropout_passes: 30
  dropout_rate: 0.1
  confidence_levels: [0.80, 0.90, 0.95]
